version: "3"

tasks:
  native:
    desc: build LocaleHook.dll (x86) via CMake
    sources:
      - native/LocaleHook.c
      - native/CMakeLists.txt
    generates:
      - native/LocaleHook.dll
    cmds:
      - pwsh -ExecutionPolicy Bypass -File native/build.ps1

  build:
    desc: build the launcher (debug)
    deps: [native]
    cmds:
      - dotnet build

  publish:
    desc: publish a self-contained single-file exe for win-x64
    deps: [native]
    cmds:
      - dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true

  clean:
    desc: remove build artifacts
    cmds:
      - rm -rf bin obj native/build native/LocaleHook.dll
