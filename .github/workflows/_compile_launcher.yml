---
name: Compile launcher

on:
  workflow_call:

jobs:
  compile_launcher:
    runs-on: windows-latest
    steps:
      - name: Fetch branch name from comment
        if: github.event.issue.pull_request && contains(github.event.comment.body, '/build')
        id: fetch-branch-name
        uses: xt0rted/pull-request-comment-branch@v3

      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.fetch-branch-name.outputs.head_ref || '' }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build native DLL
        run: pwsh -ExecutionPolicy Bypass -File native/build.ps1
        working-directory: launcher

      - name: Publish launcher
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
        working-directory: launcher

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: dqxclarity.exe
          path: launcher/bin/Release/net9.0-windows/win-x64/publish/dqxclarity.exe
          if-no-files-found: error
          retention-days: 7
          overwrite: true
