name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a new feature.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: A clear description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why would this be useful?
      description: What problem does this solve or what use case does it address?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else - mockups, examples, related issues, etc.
